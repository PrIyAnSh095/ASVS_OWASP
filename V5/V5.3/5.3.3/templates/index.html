{% extends "layout.html" %}
{% block content %}
<h2>{{ title }}</h2>
<p>Upload a ZIP archive. Control 5.3.3 Zip Slip Lab.</p>
<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".zip" required>
    <button type="submit" style="margin-top:10px;">Upload & Extract</button>
</form>
{% if message %}
    <div class="alert success">{{ message }}</div>
{% endif %}
{% if error %}
    <div class="alert error">{{ error }}</div>
{% endif %}
{% endblock %}
