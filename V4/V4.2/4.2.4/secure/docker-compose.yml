version: "3.9"

services:
  secure-app:
    build: .
    container_name: asvs-4.2.4-secure
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - APP_MODE=secure
    restart: unless-stopped
    networks:
      - asvs-network

networks:
  asvs-network:
    driver: bridge
