version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asvs-4-2-3-vulnerable-standalone
    ports:
      - "8001:8001"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
